<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Instagram Post Viewer</title>
	<style>
		body {
			margin: 0;
			width: 260px;
			font-family: Arial, sans-serif;
			background: #fff;
			color: #1f1f1f;
			border: 2px solid #d90000;
			border-radius: 10px;
			box-sizing: border-box;
			padding: 12px;
		}

		h1 {
			margin: 0 0 8px;
			font-size: 14px;
			color: #d90000;
		}

		p {
			margin: 0;
			font-size: 12px;
			line-height: 1.4;
		}
	</style>
</head>
<body>
	<h1>Instagram Post Viewer</h1>
	<p id="status">Open Instagram. Each post gets a "Show Post" button to preview image and caption.</p>
	<script src="popup.js"></script>
</body>
</html>
